services:
  - type: web
    name: frontend-switch-os-api
    runtime: node
    buildCommand: npm install
    startCommand: npm run seed --workspace server && npm start --workspace server
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: CLIENT_ORIGIN
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_COOKIE_NAME
        value: switch_os_session
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: AUTH_EMAIL_FROM
        sync: false
      - key: NODE_ENV
        value: production
