services:
  - type: web
    name: frontend-switch-os-api
    runtime: node
    buildCommand: npm install
    startCommand: npm run seed --workspace server && npm start --workspace server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: frontend-switch-os-db
          property: connectionString
      - key: CLIENT_ORIGIN
        sync: false

databases:
  - name: frontend-switch-os-db
    databaseName: frontend_switch_os
    user: frontend_switch_os
