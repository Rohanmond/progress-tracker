name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint commits
        env:
          COMMITLINT_FROM: ${{ github.event.pull_request.base.sha || github.event.before }}
          COMMITLINT_TO: ${{ github.event.pull_request.head.sha || github.sha }}
        run: npm run lint:commits

      - name: Check docs updated with feature changes
        run: npm run check:docs

      - name: Static checks
        run: npm run check

      - name: Build client
        run: npm run build
